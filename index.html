<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pogoda</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app" id="app">
  <nav class="navbar">
  <div class="nav-logo"><span>Weather</span></div>
  <ul class="nav-links">
    <li><a href="#" class="active">Pulpit</a></li>
    <li><a href="#">Mapy</a></li>
    <li><a href="#">Statystyki</a></li>
    <li><a href="#">Ustawienia</a></li>
  </ul>
  </nav>

  <div class="topbar">
    <div class="tb-dots">
      <div class="tb-dot" style="background:#ff5f57"></div>
      <div class="tb-dot" style="background:#ffbd2e"></div>
      <div class="tb-dot" style="background:#28c840"></div>
    </div>
    <div class="tb-title">Panel Pogodowy</div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="sb-section">Moje miasta</div>
      <div class="city-list" id="cityList"></div>
      <div class="add-city-form">
        <input type="text" id="cityInput" placeholder="+ Dodaj miasto..." autocomplete="off">
        <div class="city-suggestions" id="suggestions"></div>
      </div>
    </div>

    <div class="main">
      <div id="heroBlock"></div>
      <div class="forecast-strip" id="forecastStrip"></div>
      <div class="section-title">Szczegóły pogody</div>
      <div class="tiles-grid" id="tilesGrid"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-info">
      &copy; 2026 PogodaPro App. Dane dostarcza <strong>Open-Meteo</strong>.
    </div>
    <div class="footer-links">
      <a href="#">Prywatność</a>
      <a href="#">Kontakt</a>
      <a href="#">API</a>
    </div>
  </footer>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title"></div>
    <div id="modalGrid"></div>
    <div class="modal-cancel" id="modalCancel"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
